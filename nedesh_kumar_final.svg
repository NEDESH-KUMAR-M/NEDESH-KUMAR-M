  <text x="1400" y="0"  font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.9">カ</text>
  <text x="1400" y="20" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.7">B</text>
  <text x="1400" y="40" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.5">キ</text>
