<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Share+Tech+Mono&amp;display=swap');

/* Matrix fall keyframes */
@keyframes mf1{0%{transform:translateY(-120px);opacity:0}5%{opacity:1}90%{opacity:0.6}100%{transform:translateY(520px);opacity:0}}
@keyframes mf2{0%{transform:translateY(-120px);opacity:0}8%{opacity:0.8}90%{opacity:0.4}100%{transform:translateY(520px);opacity:0}}
@keyframes mf3{0%{transform:translateY(-120px);opacity:0}6%{opacity:0.9}88%{opacity:0.5}100%{transform:translateY(520px);opacity:0}}
@keyframes mf4{0%{transform:translateY(-120px);opacity:0}10%{opacity:0.7}85%{opacity:0.3}100%{transform:translateY(520px);opacity:0}}
@keyframes mf5{0%{transform:translateY(-120px);opacity:0}7%{opacity:1}92%{opacity:0.4}100%{transform:translateY(520px);opacity:0}}

/* Glitch on name */
@keyframes glitch1{0%,88%,100%{transform:translate(0,0);opacity:0}89%{transform:translate(-5px,2px);opacity:1}90.5%{transform:translate(5px,-2px);opacity:1}92%{transform:translate(-3px,1px);opacity:0.6}93%{transform:translate(0,0);opacity:0}}
@keyframes glitch2{0%,82%,100%{transform:translate(0,0);opacity:0}83%{transform:translate(5px,3px);opacity:1}84.5%{transform:translate(-5px,-3px);opacity:1}86%{transform:translate(3px,-1px);opacity:0.6}87%{transform:translate(0,0);opacity:0}}

/* Name flicker */
@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:0.5}97.5%{opacity:1}98.5%{opacity:0.6}99%{opacity:1}}

/* Scanline */
@keyframes scan{0%{transform:translateY(-8px)}100%{transform:translateY(508px)}}

/* Fade ins */
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Divider expand */
@keyframes expandDiv{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* Cursor blink */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Role cycling */
@keyframes role1{0%{opacity:0}5%{opacity:1}28%{opacity:1}33%{opacity:0}100%{opacity:0}}
@keyframes role2{0%{opacity:0}33%{opacity:0}38%{opacity:1}61%{opacity:1}66%{opacity:0}100%{opacity:0}}
@keyframes role3{0%{opacity:0}66%{opacity:0}71%{opacity:1}94%{opacity:1}99%{opacity:0}100%{opacity:0}}
@keyframes role4{0%{opacity:0}33%{opacity:0}38%{opacity:1}61%{opacity:1}66%{opacity:0}100%{opacity:0}}

/* Glow pulse */
@keyframes glowPulse{0%,100%{filter:url(#glow)}50%{filter:url(#glowStrong)}}
</style>

<filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
  <feGaussianBlur stdDeviation="5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="glowStrong" x="-30%" y="-80%" width="160%" height="260%">
  <feGaussianBlur stdDeviation="14" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="glowHalo" x="-40%" y="-100%" width="180%" height="300%">
  <feGaussianBlur stdDeviation="22" result="blur"/>
  <feMergeNode in="blur"/>
</filter>

<clipPath id="clipTop">
  <rect x="0" y="100" width="1500" height="65"/>
</clipPath>
<clipPath id="clipBot">
  <rect x="0" y="185" width="1500" height="65"/>
</clipPath>

<linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#0d1117"/>
  <stop offset="30%" stop-color="#00ff9d"/>
  <stop offset="70%" stop-color="#00ff9d"/>
  <stop offset="100%" stop-color="#0d1117"/>
</linearGradient>
<linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
  <stop offset="0%" stop-color="#00ff9d" stop-opacity="0"/>
  <stop offset="50%" stop-color="#00ff9d" stop-opacity="0.18"/>
  <stop offset="100%" stop-color="#00ff9d" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- BG -->
<rect width="1500" height="500" fill="#0d1117"/>

<!-- ═══════════════════════════════════
     MATRIX RAIN — LEFT (8 columns)
════════════════════════════════════ -->
<!-- col 20 -->
<g style="animation:mf1 4.2s -0.3s linear infinite">
  <text x="20" y="0"  font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.9">ア</text>
  <text x="20" y="20" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.7">1</text>
  <text x="20" y="40" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.5">{</text>
  <text x="20" y="60" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.35">カ</text>
  <text x="20" y="80" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.2">A</text>
