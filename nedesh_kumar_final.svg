<!-- col 120 -->
<g style="animation:mf1 4.5s -2.8s linear infinite">
  <text x="120" y="0"  font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.8">コ</text>
  <text x="120" y="20" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.6">A</text>
