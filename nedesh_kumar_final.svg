<!-- ═══════════════════════════════════
     SCANLINE SWEEP
════════════════════════════════════ -->
<rect x="0" y="0" width="1500" height="50" fill="url(#scanGrad)"
  style="animation:scan 6s linear infinite"/>

<!-- ═══════════════════════════════════
     NAME — halo, glitch, main
════════════════════════════════════ -->

<!-- Deep halo glow (outermost) -->
<text x="750" y="236"
  font-family="'Orbitron',monospace" font-weight="900" font-size="88"
  fill="#00ff9d" opacity="0.12" text-anchor="middle" letter-spacing="8"
  filter="url(#glowHalo)"
  style="animation:flicker 4s infinite">NEDESH KUMAR M</text>

<!-- Glitch layer RED — clips top portion -->
<text x="750" y="236"
  font-family="'Orbitron',monospace" font-weight="900" font-size="88"
  fill="#ff2255" opacity="0.75" text-anchor="middle" letter-spacing="8"
  clip-path="url(#clipTop)"
  style="animation:glitch1 3.5s infinite">NEDESH KUMAR M</text>

<!-- Glitch layer CYAN — clips bottom portion -->
<text x="750" y="236"
  font-family="'Orbitron',monospace" font-weight="900" font-size="88"
  fill="#00d4ff" opacity="0.75" text-anchor="middle" letter-spacing="8"
  clip-path="url(#clipBot)"
  style="animation:glitch2 3.5s infinite">NEDESH KUMAR M</text>

<!-- Inner glow layer -->
<text x="750" y="236"
  font-family="'Orbitron',monospace" font-weight="900" font-size="88"
  fill="#00ff9d" opacity="0.4" text-anchor="middle" letter-spacing="8"
  filter="url(#glowStrong)"
  style="animation:flicker 4s infinite">NEDESH KUMAR M</text>

<!-- Main name -->
<text x="750" y="236"
  font-family="'Orbitron',monospace" font-weight="900" font-size="88"
  fill="#00ff9d" text-anchor="middle" letter-spacing="8"
  filter="url(#glow)"
  style="animation:flicker 4s infinite;animation-delay:-1s">NEDESH KUMAR M</text>

