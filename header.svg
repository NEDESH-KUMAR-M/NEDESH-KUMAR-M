<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3344cc"/>
      <stop offset="100%" stop-color="#1a1f6e"/>
    </linearGradient>

    <linearGradient id="m4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a4ad0"/>
      <stop offset="100%" stop-color="#0d1050"/>
    </linearGradient>
    <linearGradient id="m3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a38b8"/>
      <stop offset="100%" stop-color="#080d38"/>
    </linearGradient>
    <linearGradient id="m2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c2690"/>
      <stop offset="100%" stop-color="#050820"/>
    </linearGradient>
    <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#101870"/>
      <stop offset="100%" stop-color="#020410"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c30"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <filter id="textglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- Sky -->
  <rect width="900" height="200" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="40"  cy="14" r="1"   fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.2;1;0.2"   dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="110" cy="8"  r="1.1" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="18" r="0.8" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.3;1;0.3"   dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="290" cy="6"  r="1"   fill="#fff" opacity="0.4"><animate attributeName="opacity" values="1;0.2;1"     dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="10" r="1"   fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;1;0.4"   dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="710" cy="16" r="1.2" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="1;0.3;1"     dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="810" cy="7"  r="0.9" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.5;1;0.5"   dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="20" r="1"   fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.1s" repeatCount="indefinite"/></circle>

  <!-- Mountain layer 4 — farthest back -->
  <path d="M0,105 Q80,60 170,82 Q260,104 350,58 Q440,12 530,48 Q620,84 710,40 Q800,0 900,30 L900,200 L0,200 Z"
    fill="url(#m4)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-15,0;0,0" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </path>

  <!-- Mountain layer 3 -->
  <path d="M0,122 Q70,90 155,108 Q240,126 325,98 Q410,70 495,92 Q580,114 665,88 Q750,62 840,84 Q875,96 900,90 L900,200 L0,200 Z"
    fill="url(#m3)" opacity="0.7">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;12,0;0,0" dur="8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </path>

  <!-- Mountain layer 2 -->
  <path d="M0,140 Q60,118 138,132 Q216,146 295,124 Q374,102 455,120 Q536,138 615,118 Q694,98 775,120 Q838,136 900,128 L900,200 L0,200 Z"
    fill="url(#m2)" opacity="0.85">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-8,0;0,0" dur="6s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </path>

  <!-- Mountain layer 1 — closest front -->
  <path d="M0,160 Q55,142 125,154 Q195,166 268,148 Q341,130 418,148 Q495,166 568,150 Q641,134 715,152 Q788,170 860,158 Q885,152 900,156 L900,200 L0,200 Z"
    fill="url(#m1)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0;6,0;0,0" dur="5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </path>

  <!-- Ground -->
  <rect x="0" y="182" width="900" height="18" fill="url(#ground)"/>

  <!-- Orbs bottom right — exact like Bruno -->
  <circle cx="752" cy="182" r="9"  fill="#4a55e0" opacity="0.55">
    <animate attributeName="opacity" values="0.35;0.75;0.35" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="9;12;9"         dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="796" cy="189" r="17" fill="#5560ee" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5"   dur="4s"   repeatCount="indefinite"/>
    <animate attributeName="r"       values="17;21;17"       dur="4s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="843" cy="182" r="14" fill="#6268f5" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.85;0.4"  dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="14;17;14"       dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <!-- NAME — no box, floating with glow -->
  <text x="450" y="68"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30" font-weight="700"
    fill="#ffffff" text-anchor="middle" letter-spacing="13"
    filter="url(#textglow)">
    NEDESH  KUMAR  M
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="94"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13" font-style="italic"
    fill="#c8caff" text-anchor="middle" letter-spacing="1.5" opacity="0.88">
    Artificial Intelligence, Machine Learning &amp; Systems.
    <animate attributeName="opacity" values="0;0.88" dur="1.8s" fill="freeze"/>
  </text>

</svg>
