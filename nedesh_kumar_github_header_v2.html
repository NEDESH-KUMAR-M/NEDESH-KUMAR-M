<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    overflow: hidden;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .banner {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 28px 40px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .name {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 52px;
    color: #00ff9d;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    position: relative;
    animation: flicker 4s infinite;
    text-shadow: 0 0 10px #00ff9d, 0 0 30px #00ff9d55;
    line-height: 1;
  }
  .name::before, .name::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    letter-spacing: inherit;
    white-space: nowrap;
  }
  .name::before {
    color: #ff0055;
    animation: glitch1 3s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
  }
  .name::after {
    color: #00cfff;
    animation: glitch2 3s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
  }
  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: #4ade80;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s 0.8s forwards;
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #00ff9d;
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  .divider {
    width: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00ff9d, transparent);
    opacity: 0;
    animation: fadeIn 0.8s 1.2s forwards;
  }
  .tags {
    display: flex;
    flex-wrap: nowrap;
    gap: 10px;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 0.8s 1.5s forwards;
  }
  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #0d1117;
    background: #00ff9d;
    padding: 3px 12px;
    border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: bold;
  }
  .tag.outline {
    background: transparent;
    color: #00ff9d;
    border: 1px solid #00ff9d55;
  }
  .scan-line {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: rgba(0,255,157,0.12);
    animation: scan 6s linear infinite;
    z-index: 5;
    pointer-events: none;
  }
  @keyframes glitch1 {
    0%, 90%, 100% { transform: translate(0); opacity: 0; }
    92% { transform: translate(-3px, 1px); opacity: 0.8; }
    94% { transform: translate(3px, -1px); opacity: 0.8; }
    96% { transform: translate(0); opacity: 0; }
  }
  @keyframes glitch2 {
    0%, 85%, 100% { transform: translate(0); opacity: 0; }
    87% { transform: translate(3px, 2px); opacity: 0.8; }
    89% { transform: translate(-3px, -2px); opacity: 0.8; }
    91% { transform: translate(0); opacity: 0; }
  }
  @keyframes flicker {
    0%, 97%, 100% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 1; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes scan {
    0% { top: -3px; }
    100% { top: 100vh; }
  }
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="scan-line"></div>
<div class="banner">
  <div class="name" data-text="NEDESH KUMAR M" id="typed-name"></div>
  <div class="divider"></div>
  <div class="subtitle"><span id="role-text"></span><span class="cursor"></span></div>
  <div class="tags">
    <span class="tag">Dev</span>
    <span class="tag outline">{ code }</span>
    <span class="tag">Build</span>
    <span class="tag outline">// create</span>
    <span class="tag">Deploy</span>
  </div>
</div>
<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
const cols = Math.floor(window.innerWidth / 20);
const drops = Array(cols).fill(1);
const chars = 'アイウエオカキクケコ01{}[]()<>ABCDEF';
function drawMatrix() {
  ctx.fillStyle = 'rgba(13,17,23,0.06)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < drops.length; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = '#00ff9d18';
    ctx.font = '14px monospace';
    ctx.fillText(char, i * 20, drops[i] * 20);
    if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 60);

const fullName = 'NEDESH KUMAR M';
const nameEl = document.getElementById('typed-name');
let ni = 0;
nameEl.textContent = '';
function typeName() {
  if (ni < fullName.length) {
    nameEl.textContent += fullName[ni++];
    nameEl.setAttribute('data-text', nameEl.textContent);
    setTimeout(typeName, 80);
  }
}
setTimeout(typeName, 200);

const roles = ['Software Engineer', 'Problem Solver', 'Code Craftsman', 'Build & Ship'];
const roleEl = document.getElementById('role-text');
let ri = 0, ci = 0, deleting = false;
function typeRole() {
  const role = roles[ri % roles.length];
  if (!deleting) {
    roleEl.textContent = role.slice(0, ++ci);
    if (ci === role.length) { deleting = true; setTimeout(typeRole, 1800); return; }
  } else {
    roleEl.textContent = role.slice(0, --ci);
    if (ci === 0) { deleting = false; ri++; }
  }
  setTimeout(typeRole, deleting ? 50 : 90);
}
setTimeout(typeRole, 1200);
</script>
</body>
</html>
